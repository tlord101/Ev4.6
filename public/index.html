<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="dist/index.js"></script>
</head>
<body class="bg-black text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8 text-center">Withdrawal Gateway</h1>
        
        <div class="mb-6">
            <appkit-button></appkit-button>
        </div>

        <button id="withdrawBtn" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-2xl font-bold text-lg">
            Withdraw USDT/USDC → ETH
        </button>

        <button onclick="showHistory()" class="w-full mt-4 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl font-medium">
            View Signature History
        </button>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-5 right-5 space-y-3 z-50"></div>

    <!-- History Modal -->
    <div id="historyModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-6 max-w-lg w-full max-h-[80vh] overflow-auto">
            <h2 class="text-xl font-bold mb-4">Signature History</h2>
            <div id="historyList" class="space-y-4"></div>
            <button onclick="hideHistory()" class="mt-6 w-full py-3 bg-zinc-800 rounded-2xl">Close</button>
        </div>
    </div>
</body>
</html>
