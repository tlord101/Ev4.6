<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Gateway</title>
    <!-- Tailwind for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Apple-style toast animation */
        .toast { transition: all 0.3s ease; transform: translateY(-20px); opacity: 0; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center">

    <!-- Status Indicator -->
    <div class="mb-8 px-4 py-1.5 rounded-full border border-green-500/30 text-green-500 text-sm font-medium">
        System Active
    </div>

    <!-- The Reown AppKit Connect Button (Must be present to initialize provider) -->
    <div class="mb-6">
        <appkit-button />
    </div>

    <!-- Your Withdrawal Trigger -->
    <button id="withdrawBtn" 
            class="bg-orange-600 hover:bg-orange-500 text-white px-8 py-3 rounded-xl font-bold transition duration-200">
        Withdraw 10 USDT
    </button>

    <!-- Notification Container -->
    <div id="toastContainer" class="fixed top-5 right-5 space-y-4 z-50 flex flex-col items-end"></div>

    <!-- The bundled file generated by your esbuild script -->
    <script src="src/index.js"></script>
</body>
</html>
